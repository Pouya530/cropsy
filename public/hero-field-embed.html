<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H0JB9SJT0R"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-H0JB9SJT0R');

  <title>Cropsy hero preview</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0c1410; }
    #c { display: block; width: 100%; height: 100%; touch-action: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="c" aria-hidden="true"></canvas>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { FIELD_PATTERNS_CORE } from "/crop-field-patterns.mjs";

    const BLADE_COUNT = 12000;
    const FIELD_RADIUS = 14;
    const LINE_WIDTHS = { circle: 0.35, line: 0.25, polygon: 0.3, arc: 0.3 };

    function computeShapeDistance(gx, gz, shape) {
      const lineWidth = LINE_WIDTHS[shape.type];
      switch (shape.type) {
        case "circle": {
          const dx = gx - shape.cx;
          const dz = gz - shape.cz;
          const dist = Math.sqrt(dx * dx + dz * dz);
          const ringDist = Math.abs(dist - shape.r);
          if (ringDist < lineWidth) return (1.0 - ringDist / lineWidth) * shape.flatten;
          return 0;
        }
        case "line": {
          const lx = shape.x2 - shape.x1;
          const lz = shape.z2 - shape.z1;
          const len = Math.sqrt(lx * lx + lz * lz);
          if (len < 0.01) return 0;
          const t = Math.max(0, Math.min(1, ((gx - shape.x1) * lx + (gz - shape.z1) * lz) / (len * len)));
          const px = shape.x1 + t * lx;
          const pz = shape.z1 + t * lz;
          const dist = Math.sqrt((gx - px) ** 2 + (gz - pz) ** 2);
          if (dist < lineWidth) return (1.0 - dist / lineWidth) * shape.flatten;
          return 0;
        }
        case "polygon": {
          let maxF = 0;
          for (let s = 0; s < shape.sides; s++) {
            const a1 = (s / shape.sides) * Math.PI * 2 + shape.offset;
            const a2 = ((s + 1) / shape.sides) * Math.PI * 2 + shape.offset;
            const x1 = shape.r * Math.cos(a1), z1 = shape.r * Math.sin(a1);
            const x2 = shape.r * Math.cos(a2), z2 = shape.r * Math.sin(a2);
            const lxx = x2 - x1, lzz = z2 - z1;
            const llen = Math.sqrt(lxx * lxx + lzz * lzz);
            const tt = Math.max(0, Math.min(1, ((gx - x1) * lxx + (gz - z1) * lzz) / (llen * llen)));
            const ppx = x1 + tt * lxx, ppz = z1 + tt * lzz;
            const ddist = Math.sqrt((gx - ppx) ** 2 + (gz - ppz) ** 2);
            if (ddist < lineWidth) maxF = Math.max(maxF, (1.0 - ddist / lineWidth) * shape.flatten);
          }
          return maxF;
        }
        case "arc": {
          const dx = gx - shape.cx;
          const dz = gz - shape.cz;
          const dist = Math.sqrt(dx * dx + dz * dz);
          const ringDist = Math.abs(dist - shape.r);
          let angle = Math.atan2(dz, dx);
          if (angle < 0) angle += Math.PI * 2;
          let start = ((shape.startAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
          let end = ((shape.endAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
          const inArc = start <= end ? angle >= start && angle <= end : angle >= start || angle <= end;
          if (ringDist < lineWidth && inArc) return (1.0 - ringDist / lineWidth) * shape.flatten;
          return 0;
        }
        default:
          return 0;
      }
    }

    function computeFlattenMap(grassPositions, bladeCount, shapes) {
      const map = new Float32Array(bladeCount);
      for (let i = 0; i < bladeCount; i++) {
        const gx = grassPositions[i * 2];
        const gz = grassPositions[i * 2 + 1];
        let maxFlatten = 0;
        for (const shape of shapes) {
          const f = computeShapeDistance(gx, gz, shape);
          if (f > maxFlatten) maxFlatten = f;
        }
        map[i] = Math.min(1.0, maxFlatten);
      }
      return map;
    }

    function interpolateFlattenMap(current, target, delta, speed = 2.0) {
      let settled = true;
      const step = Math.min(1.0, delta * speed);
      for (let i = 0; i < current.length; i++) {
        const diff = target[i] - current[i];
        if (Math.abs(diff) > 0.001) {
          current[i] += diff * step;
          settled = false;
        }
      }
      return settled;
    }

    const grassVertexShader = `
      attribute vec3 offset;
      attribute float scale;
      attribute float rotation;
      attribute float phase;
      attribute vec3 bladeColor;
      attribute float flatten;
      uniform float u_time;
      uniform float u_windStrength;
      uniform float u_windFreq;
      varying vec3 vColor;
      varying float vHeight;
      varying float vFlatten;
      void main() {
        vFlatten = flatten;
        float heightFactor = position.y;
        vHeight = heightFactor;
        float bladeScale = scale * mix(1.0, 0.08, flatten);
        vec3 pos = position;
        pos.y *= bladeScale;
        pos.x *= mix(1.0, 2.5, flatten);
        float cosR = cos(rotation);
        float sinR = sin(rotation);
        vec3 rotated = vec3(
          pos.x * cosR - pos.z * sinR,
          pos.y,
          pos.x * sinR + pos.z * cosR
        );
        float windPhase = offset.x * 0.3 + offset.z * 0.2 + phase;
        float windX = sin(u_time * u_windFreq + windPhase) * u_windStrength * heightFactor;
        float windZ = cos(u_time * u_windFreq * 0.7 + windPhase * 1.3) * u_windStrength * 0.5 * heightFactor;
        float bendAngle = flatten * 1.4;
        float bendCos = cos(bendAngle);
        float bendSin = sin(bendAngle);
        vec3 bent = vec3(
          rotated.x,
          rotated.y * bendCos - rotated.z * bendSin,
          rotated.y * bendSin + rotated.z * bendCos
        );
        vec3 final = bent + offset;
        final.x += windX;
        final.z += windZ;
        vec3 standingColour = bladeColor;
        vec3 flatColour = vec3(0.45, 0.38, 0.18);
        vColor = mix(standingColour, flatColour, flatten * 0.8);
        vColor += vec3(0.08, 0.06, 0.0) * heightFactor;
        gl_Position = projectionMatrix * viewMatrix * vec4(final, 1.0);
      }
    `;

    const grassFragmentShader = `
      varying vec3 vColor;
      varying float vHeight;
      varying float vFlatten;
      void main() {
        float shade = 0.5 + vHeight * 0.5;
        vec3 col = vColor * shade;
        col += vec3(0.02, 0.04, 0.01) * vFlatten * (1.0 - vHeight);
        gl_FragColor = vec4(col, 1.0);
      }
    `;

    const glowVertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const glowFragmentShader = `
      uniform float u_time;
      varying vec2 vUv;
      void main() {
        float dist = distance(vUv, vec2(0.5));
        float glow = smoothstep(0.5, 0.0, dist) * 0.08;
        float pulse = 0.5 + 0.5 * sin(u_time * 0.5);
        glow *= 0.7 + pulse * 0.3;
        gl_FragColor = vec4(0.3, 0.5, 0.2, glow);
      }
    `;

    const canvas = document.getElementById("c");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.08;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0f1812, 0.0065);
    scene.background = new THREE.Color(0x0f1812);

    const camera = new THREE.PerspectiveCamera(48, 1.2, 0.1, 200);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    /** Only skip intro motion when user prefers reduced motion. */
    const staticHeroCamera = reduceMotion;
    controls.autoRotate = false;
    controls.autoRotateSpeed = 0.42;
    controls.enableZoom = false;
    controls.enablePan = false;
    controls.enableRotate = false;
    controls.minPolarAngle = 0.05;
    controls.maxPolarAngle = 0.62;

    /* Every load: start straight bird's-eye, then ease into a random pan + zoom. */
    const R_START = 56;
    const rnd = Math.random();
    const endTheta = rnd * Math.PI * 2;
    const endPhi = 0.14 + Math.random() * 0.26;
    const rMul = 0.38 + Math.random() * 0.2;
    const R_END = R_START * rMul;
    const panR = Math.random() * 3.8;
    const panA = Math.random() * Math.PI * 2;
    const endPanX = Math.cos(panA) * panR;
    const endPanZ = Math.sin(panA) * panR;
    const introDur = staticHeroCamera ? 0 : 3.8 + Math.random() * 2.2;
    let introElapsed = 0;
    let introDone = false;

    const vCam = new THREE.Vector3();
    const vOffset = new THREE.Vector3();
    const startTarget = new THREE.Vector3(0, 0, 0);
    const endTarget = new THREE.Vector3(endPanX, 0, endPanZ);
    const camStart = new THREE.Vector3(0, R_START, 0);
    vOffset.setFromSpherical(new THREE.Spherical(R_END, endPhi, endTheta));
    const camEnd = new THREE.Vector3(endPanX, 0, endPanZ).add(vOffset);

    function easeOutCubic(t) {
      return 1 - (1 - t) ** 3;
    }

    function applyIntroCamera(k) {
      const e = easeOutCubic(k);
      vCam.lerpVectors(camStart, camEnd, e);
      camera.position.copy(vCam);
      controls.target.lerpVectors(startTarget, endTarget, e);
      camera.lookAt(controls.target);
    }

    if (staticHeroCamera) {
      applyIntroCamera(1);
      introDone = true;
    } else {
      applyIntroCamera(0);
    }

    let lastSyncW = 0;
    let lastSyncH = 0;
    /** Prefer iframe box size when embedded — avoids mobile innerHeight/visualViewport thrash while the parent page scrolls (was jittering the field). */
    function readEmbedSize() {
      const fe = window.frameElement;
      if (fe && fe.clientWidth >= 1 && fe.clientHeight >= 1) {
        return { w: fe.clientWidth, h: fe.clientHeight };
      }
      const vv = window.visualViewport;
      if (vv) {
        return { w: Math.max(1, vv.width), h: Math.max(1, vv.height) };
      }
      return { w: Math.max(1, window.innerWidth), h: Math.max(1, window.innerHeight) };
    }
    function syncSize() {
      const { w: rawW, h: rawH } = readEmbedSize();
      const w = Math.round(rawW);
      const h = Math.round(rawH);
      if (w === lastSyncW && h === lastSyncH) return;
      lastSyncW = w;
      lastSyncH = h;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }
    let resizeRaf = 0;
    function onResize() {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(() => {
        resizeRaf = 0;
        syncSize();
      });
    }
    window.addEventListener("resize", onResize);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", onResize);
    }
    syncSize();

    scene.add(new THREE.AmbientLight(0x2a3848, 0.78));
    const moon = new THREE.DirectionalLight(0xa8b8d8, 1.05);
    moon.position.set(12, 28, 8);
    scene.add(moon);
    scene.add(new THREE.PointLight(0x5a9a4a, 0.48, 36, 2).translateY(-1));

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(50, 64),
      new THREE.MeshStandardMaterial({ color: 0x243820, roughness: 0.92, metalness: 0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.05;
    scene.add(ground);

    const glowMat = new THREE.ShaderMaterial({
      uniforms: { u_time: { value: 0 } },
      vertexShader: glowVertexShader,
      fragmentShader: glowFragmentShader,
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide,
    });
    const glowDisc = new THREE.Mesh(new THREE.CircleGeometry(10, 48), glowMat);
    glowDisc.rotation.x = -Math.PI / 2;
    glowDisc.position.y = -0.03;
    scene.add(glowDisc);

    const bladeGeo = new THREE.BufferGeometry();
    const verts = new Float32Array([-0.04, 0, 0, 0.04, 0, 0, -0.015, 0.5, 0, 0.015, 0.5, 0, 0, 0.7, 0]);
    bladeGeo.setAttribute("position", new THREE.BufferAttribute(verts, 3));
    bladeGeo.setIndex([0, 1, 2, 1, 3, 2, 2, 3, 4]);

    const instGeo = new THREE.InstancedBufferGeometry();
    instGeo.index = bladeGeo.index;
    instGeo.setAttribute("position", bladeGeo.getAttribute("position"));

    const offsets = new Float32Array(BLADE_COUNT * 3);
    const scales = new Float32Array(BLADE_COUNT);
    const rotations = new Float32Array(BLADE_COUNT);
    const phases = new Float32Array(BLADE_COUNT);
    const colours = new Float32Array(BLADE_COUNT * 3);
    const flattenArr = new Float32Array(BLADE_COUNT);
    const grassPos = new Float32Array(BLADE_COUNT * 2);

    for (let i = 0; i < BLADE_COUNT; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.sqrt(Math.random()) * FIELD_RADIUS;
      const x = Math.cos(angle) * dist;
      const z = Math.sin(angle) * dist;
      offsets[i * 3] = x;
      offsets[i * 3 + 1] = 0;
      offsets[i * 3 + 2] = z;
      grassPos[i * 2] = x;
      grassPos[i * 2 + 1] = z;
      scales[i] = 0.6 + Math.random() * 0.8;
      rotations[i] = Math.random() * Math.PI * 2;
      phases[i] = Math.random() * Math.PI * 2;
      colours[i * 3] = 0.12 + Math.random() * 0.08;
      colours[i * 3 + 1] = 0.3 + Math.random() * 0.2;
      colours[i * 3 + 2] = 0.04 + Math.random() * 0.04;
      flattenArr[i] = 0;
    }

    instGeo.setAttribute("offset", new THREE.InstancedBufferAttribute(offsets, 3));
    instGeo.setAttribute("scale", new THREE.InstancedBufferAttribute(scales, 1));
    instGeo.setAttribute("rotation", new THREE.InstancedBufferAttribute(rotations, 1));
    instGeo.setAttribute("phase", new THREE.InstancedBufferAttribute(phases, 1));
    instGeo.setAttribute("bladeColor", new THREE.InstancedBufferAttribute(colours, 3));
    instGeo.setAttribute("flatten", new THREE.InstancedBufferAttribute(flattenArr, 1));

    const grassUniforms = {
      u_time: { value: 0 },
      u_windStrength: { value: 0.22 },
      u_windFreq: { value: 1.2 },
    };

    const grassMesh = new THREE.Mesh(
      instGeo,
      new THREE.ShaderMaterial({
        uniforms: grassUniforms,
        vertexShader: grassVertexShader,
        fragmentShader: grassFragmentShader,
        side: THREE.DoubleSide,
      })
    );
    grassMesh.frustumCulled = false;
    scene.add(grassMesh);

    const flattenAttr = instGeo.getAttribute("flatten");
    let patternIdx = 0;
    let lastPatternSwitch = 0;
    const PATTERN_CYCLE_SEC = 11;
    let targetFlatten = computeFlattenMap(grassPos, BLADE_COUNT, FIELD_PATTERNS_CORE[patternIdx].generate(1.0));
    let settled = false;

    const clock = new THREE.Clock();
    function animate() {
      const dt = clock.getDelta();
      const t = clock.getElapsedTime();
      grassUniforms.u_time.value = t;
      glowMat.uniforms.u_time.value = t;

      if (!introDone) {
        introElapsed += dt;
        const k = introDur <= 0 ? 1 : Math.min(1, introElapsed / introDur);
        applyIntroCamera(k);
        if (k >= 1) {
          introDone = true;
          controls.autoRotate = !staticHeroCamera;
        }
      }

      if (t - lastPatternSwitch > PATTERN_CYCLE_SEC) {
        lastPatternSwitch = t;
        patternIdx = (patternIdx + 1) % FIELD_PATTERNS_CORE.length;
        targetFlatten = computeFlattenMap(grassPos, BLADE_COUNT, FIELD_PATTERNS_CORE[patternIdx].generate(1.0));
        settled = false;
      }

      if (!settled) {
        settled = interpolateFlattenMap(flattenArr, targetFlatten, dt, 2.2);
        flattenAttr.needsUpdate = true;
      }

      if (introDone) {
        controls.update();
      }
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
